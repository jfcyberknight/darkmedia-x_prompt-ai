name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Incrémente la version à chaque merge sur main.
      # Patch par défaut ; mettre "#minor" ou "#major" dans le message du commit
      # de merge pour changer de palier. Le commit de bump porte [skip ci] et est
      # poussé via GITHUB_TOKEN (qui ne redéclenche pas de workflow) -> pas de boucle.
      # La version bumpée est présente dans l'arbre de travail pour le déploiement.
      - name: Bump version
        run: |
          set -euo pipefail
          LAST_MSG=$(git log -1 --pretty=%B)

          # Garde-fou : ne pas re-bumper le commit de bump lui-même.
          if echo "$LAST_MSG" | grep -qiE '\[skip ci\]|chore: bump version'; then
            echo "Commit de bump détecté — bump ignoré."
            exit 0
          fi

          CURRENT=$(jq -r '.version' version.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if echo "$LAST_MSG" | grep -qi '#major'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$LAST_MSG" | grep -qi '#minor'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "Version : ${CURRENT} -> ${NEW}"

          # version.json (source de vérité)
          jq --arg v "$NEW" '.version = $v' version.json > version.json.tmp
          mv version.json.tmp version.json

          # app/app.js (version affichée dans l'UI)
          sed -i "s/const APP_VERSION = '[^']*';/const APP_VERSION = '${NEW}';/" app/app.js

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json app/app.js
          git commit -m "chore: bump version to ${NEW} [skip ci]"
          git push origin HEAD:main

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Generate config.js from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          SUPABASE_URL=$(doppler secrets get SUPABASE_URL --plain)
          SUPABASE_ANON_KEY=$(doppler secrets get SUPABASE_ANON_KEY --plain)
          printf "const SUPABASE_URL = '%s';\nconst SUPABASE_ANON_KEY = '%s';\n" "$SUPABASE_URL" "$SUPABASE_ANON_KEY" > app/config.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - id: deployment
        uses: actions/deploy-pages@v4

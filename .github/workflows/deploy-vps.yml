name: Deploy Prompt AI to VPS

# Deploiement continu de l'app Laravel (dossier laravel/) sur le VPS OVH
# vps-c4db969c via SSH + Cloudflare Tunnel. Meme convention que les autres apps
# du VPS : push main -> CI -> SSH -> docker compose. Exposition publique par
# tunnel Cloudflare uniquement (aucun port 80/443 -- regle d'or, CityPulse).
#
# ENTIEREMENT AUTO-PROVISIONNE : le job `deploy` clone le depot au 1er passage,
# genere laravel/.env depuis les secrets/vars CI s'il est absent (idempotent :
# un .env existant est preserve tel quel), configure le tunnel, puis build/up.
#
# Secrets requis : VPS_SSH_KEY, CF_API_TOKEN, CF_ACCOUNT_ID, MAIL_PASSWORD,
# OPENROUTER_API_KEY. Variables optionnelles : VPS_HOST/USER/PORT/APP_PATH,
# DEPLOY_BRANCH, CF_TUNNEL_HOSTNAME, MAIL_USERNAME/FROM_ADDRESS/FROM_NAME,
# MAGIC_LINK_ALLOWED_EMAILS, OPENROUTER_API_URL.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laravel
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_sqlite, sqlite3, bcmath, intl, zip
          coverage: none
      - name: Composer install
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Preparer l'environnement de test
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite
      - name: Tests PHPUnit
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      # Reconstruit un PEM valide quel que soit le format du secret : \n
      # litteraux, vraies lignes, espaces, ou tout colle sur une seule ligne.
      # On retire les marqueurs, on supprime TOUS les blancs pour recuperer le
      # corps base64 brut, puis on le ré-emballe en 70 colonnes.
      - name: Normaliser la cle SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          norm=$(printf '%b' "$VPS_SSH_KEY")
          body=$(printf '%s' "$norm" \
            | sed -e 's/-----BEGIN OPENSSH PRIVATE KEY-----//g' \
                  -e 's/-----END OPENSSH PRIVATE KEY-----//g' \
            | tr -d '[:space:]')
          if [ ${#body} -lt 100 ]; then
            echo "::error::VPS_SSH_KEY : corps base64 trop court ou marqueurs PEM absents (recolle la cle complete)."
            exit 1
          fi
          install -m 600 /dev/null /tmp/vps_key
          {
            printf '%s\n' '-----BEGIN OPENSSH PRIVATE KEY-----'
            printf '%s' "$body" | fold -w 70
            printf '\n%s\n' '-----END OPENSSH PRIVATE KEY-----'
          } > /tmp/vps_key
          if ssh-keygen -y -f /tmp/vps_key >/dev/null 2>&1; then
            echo "Cle SSH reconstruite et valide."
          else
            echo "::error::VPS_SSH_KEY invalide : le corps base64 est incomplet ou altere. Recolle le PEM COMPLET (de BEGIN a END) dans le secret."
            exit 1
          fi

      - name: Deploy over SSH (auto-provision)
        uses: appleboy/ssh-action@v1
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          CF_TUNNEL_HOSTNAME: ${{ vars.CF_TUNNEL_HOSTNAME || secrets.CF_TUNNEL_HOSTNAME }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH || 'main' }}
          MAIL_USERNAME: ${{ vars.MAIL_USERNAME || 'vallee.jeanfrancois@gmail.com' }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM_ADDRESS: ${{ vars.MAIL_FROM_ADDRESS || 'vallee.jeanfrancois@gmail.com' }}
          MAIL_FROM_NAME: ${{ vars.MAIL_FROM_NAME || 'DarkMedia Prompt AI' }}
          MAGIC_LINK_ALLOWED_EMAILS: ${{ vars.MAGIC_LINK_ALLOWED_EMAILS || 'vallee.jeanfrancois@gmail.com' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_URL: ${{ vars.OPENROUTER_API_URL || 'https://openrouter.ai/api/v1' }}
        with:
          host: ${{ vars.VPS_HOST || 'vps-c4db969c.vps.ovh.ca' }}
          username: ${{ vars.VPS_USER || 'ubuntu' }}
          port: ${{ vars.VPS_PORT || 22 }}
          key_path: /tmp/vps_key
          envs: CF_API_TOKEN,CF_ACCOUNT_ID,CF_TUNNEL_HOSTNAME,DEPLOY_BRANCH,MAIL_USERNAME,MAIL_PASSWORD,MAIL_FROM_ADDRESS,MAIL_FROM_NAME,MAGIC_LINK_ALLOWED_EMAILS,OPENROUTER_API_KEY,OPENROUTER_API_URL
          script: |
            set -e
            REPO="${{ vars.VPS_APP_PATH || '/opt/darkmedia-x_prompt-ai' }}"
            HOSTN="${CF_TUNNEL_HOSTNAME:-promptai.darkmedia-x.com}"
            if [ ! -d "$REPO/.git" ]; then
              echo "> Clone initial du depot dans $REPO"
              sudo mkdir -p "$REPO"
              sudo chown "$(id -u):$(id -g)" "$REPO"
              git clone https://github.com/jfcyberknight/darkmedia-x_prompt-ai.git "$REPO"
            fi
            cd "$REPO"
            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            cd laravel
            if [ ! -f .env ]; then
              echo "> Generation initiale de laravel/.env"
              umask 077
              : > .env
              printf '%s\n' 'APP_NAME="DarkMedia Prompt AI"' >> .env
              printf '%s\n' 'APP_ENV=production' >> .env
              printf '%s\n' 'APP_DEBUG=false' >> .env
              printf '%s\n' "APP_URL=https://$HOSTN" >> .env
              printf '%s\n' 'APP_LOCALE=fr' >> .env
              printf '%s\n' 'APP_KEY=' >> .env
              printf '%s\n' 'DB_CONNECTION=sqlite' >> .env
              printf '%s\n' 'DB_DATABASE=/data/database.sqlite' >> .env
              printf '%s\n' 'MAIL_MAILER=smtp' >> .env
              printf '%s\n' 'MAIL_HOST=smtp.gmail.com' >> .env
              printf '%s\n' 'MAIL_PORT=587' >> .env
              printf '%s\n' "MAIL_USERNAME=$MAIL_USERNAME" >> .env
              printf '%s\n' "MAIL_PASSWORD=\"$MAIL_PASSWORD\"" >> .env
              printf '%s\n' 'MAIL_SCHEME=smtp' >> .env
              printf '%s\n' "MAIL_FROM_ADDRESS=\"$MAIL_FROM_ADDRESS\"" >> .env
              printf '%s\n' "MAIL_FROM_NAME=\"$MAIL_FROM_NAME\"" >> .env
              printf '%s\n' "MAGIC_LINK_ALLOWED_EMAILS=$MAGIC_LINK_ALLOWED_EMAILS" >> .env
              printf '%s\n' 'MAGIC_LINK_EXPIRATION_MINUTES=15' >> .env
              printf '%s\n' "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" >> .env
              printf '%s\n' "OPENROUTER_API_URL=$OPENROUTER_API_URL" >> .env
              printf '%s\n' 'AI_TIMEOUT_SECONDS=45' >> .env
              printf '%s\n' 'APP_PORT=8092' >> .env
            fi
            if [ -n "${CF_API_TOKEN:-}" ] && [ -n "${CF_ACCOUNT_ID:-}" ] && [ -f ../scripts/setup-cloudflare-tunnel.sh ]; then
              SKIP_DEPLOY=1 PUBLIC_HOSTNAME="$HOSTN" TUNNEL_NAME=prompt-ai \
                ORIGIN_SERVICE=http://app:8080 bash ../scripts/setup-cloudflare-tunnel.sh \
                || echo "Tunnel non configure (non bloquant)"
            fi
            docker rm -f prompt-ai prompt-ai-cloudflared 2>/dev/null || true
            docker compose -f docker-compose.vps.yml up -d --build
            docker image prune -f
            echo "> Verification sante loopback..."
            ok=0
            for i in $(seq 1 20); do
              code=$(curl -fsS -o /dev/null -w '%{http_code}' http://localhost:8092/up 2>/dev/null || echo 000)
              echo "  tentative $i : HTTP $code"
              [ "$code" = "200" ] && { ok=1; break; }
              sleep 6
            done
            [ "$ok" = "1" ] && echo "OK: app en ligne en local (loopback 8092)" || { echo "::error::app locale KO"; docker compose -f docker-compose.vps.yml logs --tail=50 app || true; exit 1; }
            echo "> Verification sante publique (best-effort)..."
            for i in $(seq 1 8); do
              pcode=$(curl -fsS -o /dev/null -w '%{http_code}' "https://$HOSTN/up" 2>/dev/null || echo 000)
              echo "  public $i : HTTP $pcode"
              [ "$pcode" = "200" ] && { echo "OK: https://$HOSTN en ligne"; break; }
              sleep 15
            done

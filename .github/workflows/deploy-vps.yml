name: Deploy Prompt AI to VPS

# Deploiement continu de l'app Laravel (dossier laravel/) sur le VPS OVH
# vps-c4db969c via SSH + Cloudflare Tunnel. Auto-provisionne : clone au 1er
# passage, RECONCILIE laravel/.env depuis les secrets CI a chaque deploiement
# (les cles gerees sont (re)ecrites ; APP_KEY et le token tunnel sont preserves),
# configure le tunnel, puis build/up. Exposition publique par tunnel Cloudflare
# uniquement (aucun port 80/443 -- regle d'or, CityPulse).
#
# Secrets requis : VPS_SSH_KEY, CF_API_TOKEN, CF_ACCOUNT_ID, DMX_MAILER_KEY
# (clé d'auth du service e-mail privé dmx-mailer), OPENROUTER_API_KEY.
# Variables optionnelles : VPS_HOST/USER/PORT/APP_PATH, DEPLOY_BRANCH,
# CF_TUNNEL_HOSTNAME, DMX_MAILER_URL, MAIL_FROM_ADDRESS/FROM_NAME,
# MAGIC_LINK_ALLOWED_EMAILS, OPENROUTER_API_URL.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laravel
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_sqlite, sqlite3, bcmath, intl, zip
          coverage: none
      - name: Composer install
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Preparer l'environnement de test
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite
      - name: Tests PHPUnit
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Normaliser la cle SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          norm=$(printf '%b' "$VPS_SSH_KEY")
          body=$(printf '%s' "$norm" | sed -e 's/-----BEGIN OPENSSH PRIVATE KEY-----//g' -e 's/-----END OPENSSH PRIVATE KEY-----//g' | tr -d '[:space:]')
          install -m 600 /dev/null /tmp/vps_key
          { printf '%s\n' '-----BEGIN OPENSSH PRIVATE KEY-----'; printf '%s' "$body" | fold -w 70; printf '\n%s\n' '-----END OPENSSH PRIVATE KEY-----'; } > /tmp/vps_key
          ssh-keygen -y -f /tmp/vps_key >/dev/null 2>&1 || { echo '::error::VPS_SSH_KEY invalide'; exit 1; }

      - name: Deploy over SSH (auto-provision)
        uses: appleboy/ssh-action@v1
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          CF_TUNNEL_HOSTNAME: ${{ vars.CF_TUNNEL_HOSTNAME || secrets.CF_TUNNEL_HOSTNAME }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH || 'main' }}
          DMX_MAILER_URL: ${{ vars.DMX_MAILER_URL || 'http://dmx-mailer:8080' }}
          DMX_MAILER_KEY: ${{ secrets.DMX_MAILER_KEY }}
          MAIL_FROM_ADDRESS: ${{ vars.MAIL_FROM_ADDRESS || 'vallee.jeanfrancois@gmail.com' }}
          MAIL_FROM_NAME: ${{ vars.MAIL_FROM_NAME || 'DarkMedia Prompt AI' }}
          MAGIC_LINK_ALLOWED_EMAILS: ${{ vars.MAGIC_LINK_ALLOWED_EMAILS || 'vallee.jeanfrancois@gmail.com' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_URL: ${{ vars.OPENROUTER_API_URL || 'https://openrouter.ai/api/v1' }}
        with:
          host: ${{ vars.VPS_HOST || 'vps-c4db969c.vps.ovh.ca' }}
          username: ${{ vars.VPS_USER || 'ubuntu' }}
          port: ${{ vars.VPS_PORT || 22 }}
          key_path: /tmp/vps_key
          envs: CF_API_TOKEN,CF_ACCOUNT_ID,CF_TUNNEL_HOSTNAME,DEPLOY_BRANCH,DMX_MAILER_URL,DMX_MAILER_KEY,MAIL_FROM_ADDRESS,MAIL_FROM_NAME,MAGIC_LINK_ALLOWED_EMAILS,OPENROUTER_API_KEY,OPENROUTER_API_URL
          script: |
            set -e
            REPO="${{ vars.VPS_APP_PATH || '/opt/darkmedia-x_prompt-ai' }}"
            HOSTN="${CF_TUNNEL_HOSTNAME:-promptai.darkmedia-x.com}"
            if [ ! -d "$REPO/.git" ]; then
              echo "> Clone initial du depot dans $REPO"
              sudo mkdir -p "$REPO"
              sudo chown "$(id -u):$(id -g)" "$REPO"
              git clone https://github.com/jfcyberknight/darkmedia-x_prompt-ai.git "$REPO"
            fi
            cd "$REPO"
            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            cd laravel
            # 2) RECONCILIER laravel/.env : (re)ecrit les cles gerees depuis les
            #    secrets CI (corrige un .env issu du .env.vps.example) en
            #    preservant APP_KEY et les cles non gerees (token tunnel, profils).
            touch .env
            MANAGED='^(APP_NAME|APP_ENV|APP_DEBUG|APP_URL|APP_LOCALE|APP_KEY|DB_CONNECTION|DB_DATABASE|MAIL_MAILER|DMX_MAILER_URL|DMX_MAILER_KEY|MAIL_FROM_ADDRESS|MAIL_FROM_NAME|MAGIC_LINK_ALLOWED_EMAILS|MAGIC_LINK_EXPIRATION_MINUTES|OPENROUTER_API_KEY|OPENROUTER_API_URL|AI_TIMEOUT_SECONDS|APP_PORT)='
            OLD_APP_KEY=$(grep -E '^APP_KEY=' .env | head -1 | cut -d= -f2- || true)
            grep -vE "$MANAGED" .env > .env.keep 2>/dev/null || true
            umask 077
            {
              printf '%s\n' 'APP_NAME="DarkMedia Prompt AI"'
              printf '%s\n' 'APP_ENV=production'
              printf '%s\n' 'APP_DEBUG=false'
              printf '%s\n' "APP_URL=https://$HOSTN"
              printf '%s\n' 'APP_LOCALE=fr'
              printf '%s\n' "APP_KEY=$OLD_APP_KEY"
              printf '%s\n' 'DB_CONNECTION=sqlite'
              printf '%s\n' 'DB_DATABASE=/data/database.sqlite'
              printf '%s\n' 'MAIL_MAILER=dmxmailer'
              printf '%s\n' "DMX_MAILER_URL=$DMX_MAILER_URL"
              printf '%s\n' "DMX_MAILER_KEY=\"$DMX_MAILER_KEY\""
              printf '%s\n' "MAIL_FROM_ADDRESS=\"$MAIL_FROM_ADDRESS\""
              printf '%s\n' "MAIL_FROM_NAME=\"$MAIL_FROM_NAME\""
              printf '%s\n' "MAGIC_LINK_ALLOWED_EMAILS=$MAGIC_LINK_ALLOWED_EMAILS"
              printf '%s\n' 'MAGIC_LINK_EXPIRATION_MINUTES=15'
              printf '%s\n' "OPENROUTER_API_KEY=$OPENROUTER_API_KEY"
              printf '%s\n' "OPENROUTER_API_URL=$OPENROUTER_API_URL"
              printf '%s\n' 'AI_TIMEOUT_SECONDS=45'
              printf '%s\n' 'APP_PORT=8092'
              cat .env.keep 2>/dev/null || true
            } > .env
            rm -f .env.keep
            if [ -n "${CF_API_TOKEN:-}" ] && [ -n "${CF_ACCOUNT_ID:-}" ] && [ -f ../scripts/setup-cloudflare-tunnel.sh ]; then
              SKIP_DEPLOY=1 PUBLIC_HOSTNAME="$HOSTN" TUNNEL_NAME=prompt-ai \
                ORIGIN_SERVICE=http://app:8080 bash ../scripts/setup-cloudflare-tunnel.sh \
                || echo "Tunnel non configure (non bloquant)"
            fi
            docker rm -f prompt-ai prompt-ai-cloudflared 2>/dev/null || true
            docker compose -f docker-compose.vps.yml up -d --build
            docker image prune -f
            echo "> Verification sante loopback..."
            ok=0
            for i in $(seq 1 20); do
              code=$(curl -fsS -o /dev/null -w '%{http_code}' http://localhost:8092/up 2>/dev/null || echo 000)
              echo "  tentative $i : HTTP $code"
              [ "$code" = "200" ] && { ok=1; break; }
              sleep 6
            done
            [ "$ok" = "1" ] && echo "OK: app en ligne en local (loopback 8092)" || { echo "::error::app locale KO"; docker compose -f docker-compose.vps.yml logs --tail=50 app || true; exit 1; }
            echo "> Verification sante publique (best-effort)..."
            for i in $(seq 1 8); do
              pcode=$(curl -fsS -o /dev/null -w '%{http_code}' "https://$HOSTN/up" 2>/dev/null || echo 000)
              echo "  public $i : HTTP $pcode"
              [ "$pcode" = "200" ] && { echo "OK: https://$HOSTN en ligne"; break; }
              sleep 15
            done

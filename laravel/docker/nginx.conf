user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    server {
        listen 8080;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Le conteneur est destiné à tourner derrière le reverse-proxy du VPS,
        # qui termine le TLS et transmet X-Forwarded-*.
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
        }

        location ~* \.(?:css|js|svg|ico|png|jpg|jpeg|gif|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # Le service worker ne doit jamais être mis en cache agressivement,
        # sinon les mises à jour de la PWA ne sont jamais détectées.
        location = /sw.js {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        location ~ /\.(?!well-known) {
            deny all;
        }
    }
}

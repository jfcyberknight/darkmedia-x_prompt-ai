; Réglages de production
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 60
expose_php = Off

; OPcache : le code ne change pas dans une image immuable, on valide donc les
; timestamps rarement et on garde tout en mémoire.
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
